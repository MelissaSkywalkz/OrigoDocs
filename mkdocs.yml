site_name: OrigoDocs Preview (MkDocs)
site_description: Parallel MkDocs + Material preview for OrigoDocs
site_url: https://melissaskywalkz.github.io/OrigoDocs/mkdocs/site/
repo_url: https://github.com/MelissaSkywalkz/OrigoDocs
edit_uri: ""
docs_dir: mkdocs/docs
site_dir: mkdocs/site

theme:
  name: material
  language: sv
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - toc.follow
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - attr_list
  - md_in_html

nav:
  - Start: index.md
  - Origo: origo.md
  - GeoServer: geoserver.md
  - GeoWebCache: geowebcache.md
  - Prestanda: prestanda.md
  - Felsökning: felsokning.md
  - Release: release-playbook.md
  - Lab:
      - Try it-lab: lab/index.md
