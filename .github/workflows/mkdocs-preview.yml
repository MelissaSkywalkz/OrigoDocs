name: Deploy MkDocs Preview

on:
  push:
    branches: ["work", "main", "master"]
    paths:
      - 'mkdocs.yml'
      - 'mkdocs/**'
      - '.github/workflows/mkdocs-preview.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mkdocs/requirements.txt

      - name: Build MkDocs site
        run: mkdocs build -f mkdocs.yml --strict

      - name: Deploy preview to gh-pages-mkdocs branch (/mkdocs path)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages-mkdocs
          publish_dir: ./mkdocs/site
          destination_dir: mkdocs/site
          keep_files: true
